# Trigger on Release workflow completion (not release: published) — see #158.
# The release event fires before bundles are uploaded; workflow_run waits for
# the entire Release workflow (including the bundle-uploading matrix) to finish.
name: Update Winget Manifest

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update (e.g., 0.10.0)"
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  update-winget:
    name: Generate and submit Winget manifest
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            VERSION="${{ github.event.workflow_run.head_branch }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Processing version: ${VERSION}"

      - name: Download MSI and compute hashes
        id: hashes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Download MSI
          MSI_URL="https://github.com/zosmaai/zosma-cowork/releases/download/v${VERSION}/zosma-cowork_${VERSION}_x64_en-US.msi"
          echo "Downloading MSI from: ${MSI_URL}"
          curl -fSL -o "zosma-cowork.msi" "${MSI_URL}" || {
            echo "MSI not found at ${MSI_URL} — trying alternative naming..."
            MSI_URL="https://github.com/zosmaai/zosma-cowork/releases/download/v${VERSION}/zosma-cowork_${VERSION}_x64.msi"
            curl -fSL -o "zosma-cowork.msi" "${MSI_URL}" || echo "MSI not found"
          }
          if [ -f zosma-cowork.msi ]; then
            MSI_SHA256=$(sha256sum zosma-cowork.msi | cut -d' ' -f1)
            echo "msi_sha256=${MSI_SHA256}" >> $GITHUB_OUTPUT
            echo "MSI SHA256: ${MSI_SHA256}"
          fi

          # Download EXE
          EXE_URL="https://github.com/zosmaai/zosma-cowork/releases/download/v${VERSION}/zosma-cowork_${VERSION}_x64-setup.exe"
          echo "Downloading EXE from: ${EXE_URL}"
          curl -fSL -o "zosma-cowork.exe" "${EXE_URL}" || echo "EXE not found"
          if [ -f zosma-cowork.exe ]; then
            EXE_SHA256=$(sha256sum zosma-cowork.exe | cut -d' ' -f1)
            echo "exe_sha256=${EXE_SHA256}" >> $GITHUB_OUTPUT
            echo "EXE SHA256: ${EXE_SHA256}"
          fi

      - name: Generate winget manifest
        id: manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MSI_SHA256="${{ steps.hashes.outputs.msi_sha256 }}"
          EXE_SHA256="${{ steps.hashes.outputs.exe_sha256 }}"

          MANIFEST_DIR="manifests/z/ZosmaAI/ZosmaCowork/${VERSION}"
          mkdir -p "${MANIFEST_DIR}"

          # Generate 3-file multi-file manifest (winget v1.12.0 schema)
          # winget-pkgs no longer accepts single-file manifests

          # File 1: Version manifest
          FILE="${MANIFEST_DIR}/ZosmaAI.ZosmaCowork.yaml"
          echo "# yaml-language-server: \$schema=https://aka.ms/winget-manifest.version.1.12.0.schema.json" > "$FILE"
          echo "" >> "$FILE"
          echo "PackageIdentifier: ZosmaAI.ZosmaCowork" >> "$FILE"
          echo "PackageVersion: \"${VERSION}\"" >> "$FILE"
          echo "DefaultLocale: en-US" >> "$FILE"
          echo "ManifestType: version" >> "$FILE"
          echo "ManifestVersion: 1.12.0" >> "$FILE"

          # File 2: Installer manifest
          FILE="${MANIFEST_DIR}/ZosmaAI.ZosmaCowork.installer.yaml"
          echo "# yaml-language-server: \$schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json" > "$FILE"
          echo "" >> "$FILE"
          echo "PackageIdentifier: ZosmaAI.ZosmaCowork" >> "$FILE"
          echo "PackageVersion: \"${VERSION}\"" >> "$FILE"
          echo "InstallerLocale: en-US" >> "$FILE"
          echo "InstallerType: msi" >> "$FILE"
          echo "InstallModes:" >> "$FILE"
          echo "  - interactive" >> "$FILE"
          echo "  - silent" >> "$FILE"
          echo "  - silentWithProgress" >> "$FILE"
          echo "UpgradeBehavior: install" >> "$FILE"
          echo "ProductCode: \"{9229EE7D-C4AE-4F0D-A6BF-E39EA1E2215B}\"" >> "$FILE"
          echo "Installers:" >> "$FILE"
          echo "  - Architecture: x64" >> "$FILE"
          if [ -n "${MSI_SHA256}" ]; then
            echo "    InstallerType: msi" >> "$FILE"
            echo "    InstallerUrl: https://github.com/zosmaai/zosma-cowork/releases/download/v${VERSION}/zosma-cowork_${VERSION}_x64_en-US.msi" >> "$FILE"
            echo "    InstallerSha256: \"${MSI_SHA256}\"" >> "$FILE"
          else
            echo "    InstallerType: exe" >> "$FILE"
            echo "    InstallerUrl: https://github.com/zosmaai/zosma-cowork/releases/download/v${VERSION}/zosma-cowork_${VERSION}_x64-setup.exe" >> "$FILE"
            echo "    InstallerSha256: \"${EXE_SHA256}\"" >> "$FILE"
            echo "    InstallerSwitches:" >> "$FILE"
            echo "      Silent: /S" >> "$FILE"
            echo "      SilentWithProgress: /S" >> "$FILE"
          fi
          echo "ManifestType: installer" >> "$FILE"
          echo "ManifestVersion: 1.12.0" >> "$FILE"

          # File 3: Locale manifest
          FILE="${MANIFEST_DIR}/ZosmaAI.ZosmaCowork.locale.en-US.yaml"
          echo "# yaml-language-server: \$schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json" > "$FILE"
          echo "" >> "$FILE"
          echo "PackageIdentifier: ZosmaAI.ZosmaCowork" >> "$FILE"
          echo "PackageVersion: \"${VERSION}\"" >> "$FILE"
          echo "PackageLocale: en-US" >> "$FILE"
          echo "Publisher: Zosma AI" >> "$FILE"
          echo "PublisherUrl: https://zosma.ai" >> "$FILE"
          echo "PublisherSupportUrl: https://github.com/zosmaai/zosma-cowork/issues" >> "$FILE"
          echo "PackageName: Zosma Cowork" >> "$FILE"
          echo "PackageUrl: https://zosma.ai/zosma-cowork" >> "$FILE"
          echo "License: MIT" >> "$FILE"
          echo "LicenseUrl: https://github.com/zosmaai/zosma-cowork/blob/main/LICENSE" >> "$FILE"
          echo "ShortDescription: Desktop AI coworker - streaming, thinking, tool calls, multi-turn sessions" >> "$FILE"
          echo "Moniker: zosma-cowork" >> "$FILE"
          echo "Tags:" >> "$FILE"
          echo "  - ai" >> "$FILE"
          echo "  - agent" >> "$FILE"
          echo "  - coworker" >> "$FILE"
          echo "  - pi" >> "$FILE"
          echo "  - coding" >> "$FILE"
          echo "  - assistant" >> "$FILE"
          echo "ManifestType: defaultLocale" >> "$FILE"
          echo "ManifestVersion: 1.12.0" >> "$FILE"

          echo "manifest_dir=${MANIFEST_DIR}" >> $GITHUB_OUTPUT
          echo "Generated multi-file manifest at ${MANIFEST_DIR}/"

      - name: Submit to winget-pkgs
        if: false
        # This step is commented out until we have a forked winget-pkgs repo
        # and a GITHUB_TOKEN with write access to it.
        #
        # To enable:
        # 1. Fork https://github.com/microsoft/winget-pkgs to zosmaai/winget-pkgs
        # 2. Create a GitHub PAT with "public_repo" scope
        # 3. Add it as WINGET_PKGS_TOKEN secret
        # 4. Change 'if: false' to 'if: true'
        #
        # Or use the winget-create CLI tool as an alternative.
        run: |
          echo "Manual submission required:"
          echo "  git clone https://github.com/microsoft/winget-pkgs.git"
          echo "  cp -r ${{ steps.manifest.outputs.manifest_dir }} winget-pkgs/"
          echo "  cd winget-pkgs"
          echo "  git checkout -b ZosmaAI.ZosmaCowork-v${{ steps.version.outputs.version }}"
          echo "  git add manifests/"
          echo "  git commit -m 'ZosmaAI.ZosmaCowork version ${{ steps.version.outputs.version }}'"
          echo "  git push origin HEAD"
          echo "  gh pr create --repo microsoft/winget-pkgs --fill"

      - name: Print manifest
        run: |
          echo "Generated manifest:"
          echo "---"
          cat "manifests/z/ZosmaAI/ZosmaCowork/${{ steps.version.outputs.version }}/ZosmaAI.ZosmaCowork.yaml" 2>/dev/null || echo "(manifest not found)"
          echo "---"
          echo "To submit, copy the 'manifests/' directory and create a PR against microsoft/winget-pkgs."
