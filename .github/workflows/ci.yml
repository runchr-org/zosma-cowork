name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build frontend
        run: npm run build:frontend
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

  agent-sidecar:
    name: Agent Sidecar Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-sidecar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  tauri:
    name: Tauri Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build agent-sidecar
        run: node scripts/prebuild.mjs

      - name: Fetch bundled Node.js binary
        # Tauri's build.rs validates that `binaries/node` (declared in
        # tauri.conf.json's bundle.resources) exists at compile time.
        # The file is gitignored (it's a ~50MB platform binary), so CI
        # must fetch it before the cargo build runs.
        run: node src-tauri/scripts/fetch-node.mjs

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain stable -y
          fi
          rustup toolchain install stable --component rustfmt --component clippy --no-self-update
          rustup default stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build check
        run: cargo build --workspace
        env:
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
