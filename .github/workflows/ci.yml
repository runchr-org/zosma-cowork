name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build frontend
        run: npm run build:frontend
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

  agent-sidecar:
    name: Agent Sidecar Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-sidecar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  tauri:
    name: Tauri Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build agent-sidecar
        shell: bash
        run: |
          cd agent-sidecar
          npm ci
          npm run bundle
          # Patch import_meta.url for CJS compatibility (cross-platform node, not sed)
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('dist/bundle.cjs', 'utf-8');
            code = code.replace(/var (import_meta\\d*) = \{\\};/g, (_, m) => 'var ' + m + ' = { url: require(\"url\").pathToFileURL(__filename).href };');
            fs.writeFileSync('dist/bundle.cjs', code, 'utf-8');
          "
          # Copy bundle and runtime dependencies into src-tauri/ for Tauri resource bundling
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/agent-sidecar"
          cp dist/bundle.cjs "$GITHUB_WORKSPACE/src-tauri/agent-sidecar/index.cjs"
          # Copy typebox alongside the bundle — pi-coding-agent uses require.resolve("typebox") at runtime
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/agent-sidecar/node_modules"
          cp -r node_modules/typebox "$GITHUB_WORKSPACE/src-tauri/agent-sidecar/node_modules/typebox"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build check
        run: cargo build --workspace
        env:
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
