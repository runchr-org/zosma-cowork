name: Staging Build

# ─────────────────────────────────────────────────────────────────────────────
# Staging builds for internal testing.
#
# WHAT this does:
#   - When a PR is labeled `staging` (or manually via `workflow_dispatch`),
#     bundle the desktop app for macOS-universal, Linux-x64, Windows-x64.
#   - Upload the installers as workflow artifacts (14 day retention).
#   - Hand off to `staging-notify.yml` (a `workflow_run` workflow) which
#     posts a Discord message with auth-free nightly.link download links
#     and drops a sticky comment on the PR. That half runs in the trusted
#     base-repo context, so it works for FORK PRs too, without ever
#     exposing the webhook secret to fork code.
#
# WHY label-triggered, not push-to-main triggered:
#   - Reviewers want to bash on the artifact BEFORE merging, not after. A
#     buggy `main` is a worse problem than a slightly stale staging build.
#   - We don't want to burn 3 × 90-min runner-minutes on every push to every
#     PR. The author / reviewer adds the `staging` label when the PR is at
#     a "please test" state. Subsequent pushes to that labeled PR rebuild.
#   - `workflow_dispatch` is the manual escape hatch for arbitrary refs
#     (e.g. building from `main` post-merge, or from a release branch).
#
# WHAT this DOES NOT do:
#   - Does NOT create a GitHub Release. Production release flow is still
#     `release.yml` (tag-triggered on `v*.*.*` / `*.*.*`).
#   - Does NOT publish to AUR / winget / Homebrew. Those are gated on
#     `update-aur.yml`, `update-winget.yml`, `notify-homebrew.yml` which
#     fire on `release` events, not on this workflow.
#   - Does NOT code-sign. Apple notarisation is metered and burning quota
#     on every label add isn't worth it. Internal testers dismiss the OS
#     warnings (the Discord embed and PR comment include the macOS `xattr`
#     step and the Windows "Run anyway" step).
#   - Does NOT post to Discord / comment on the PR itself, and does NOT
#     read any repo secret. Fork PRs run WITHOUT secrets and with a
#     read-only token, so notification is split into a separate
#     `workflow_run`-triggered workflow (`staging-notify.yml`) that runs in
#     the base-repo context with secret + write access AFTER this build
#     completes. This job only ever compiles untrusted PR code and uploads
#     artifacts + a metadata file — it never sees `DISCORD_STAGING_WEBHOOK`,
#     so a malicious fork cannot exfiltrate it. This is deliberately
#     preferred over `pull_request_target`, which WOULD run fork build code
#     with secrets in scope. See staging-notify.yml for the notify half.
#
# Tracks zosmaai/zosma-cowork#133.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    # `labeled`     fires when ANY label is added; we filter to `staging`
    #               via the job-level `if:` below.
    # `synchronize` fires on every push to the PR head. We want this so
    #               testers always get the latest commit's artifact AS
    #               LONG AS the staging label is still on the PR.
    # `reopened`    rebuild if a closed labeled PR is reopened.
    types: [labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build (defaults to default branch)"
        required: false
        type: string

permissions:
  contents: read   # build only checks out + compiles untrusted code; no secrets, no PR writes

concurrency:
  # One staging build in flight per PR (or per dispatch ref). If a new
  # commit lands on a labeled PR while a build is running, abandon the
  # older one — testers only care about the tip. Fork PRs without a
  # number fall back to the ref, keeping fork branches isolated.
  group: staging-build-${{ github.event.pull_request.number || github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    timeout-minutes: 90
    # Gate: only run when one of
    #   (a) the workflow was manually dispatched, OR
    #   (b) the PR carries the `staging` label.
    # For `labeled` events specifically, `github.event.label.name` lets us
    # avoid kicking a fresh build on every UNRELATED label add (e.g. someone
    # adding `tech-debt`). For `synchronize` / `reopened` the label set on
    # the PR object is the source of truth.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'staging') ||
      (github.event_name == 'pull_request' && github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'staging'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            name: macOS-universal
          - platform: ubuntu-22.04
            args: ""
            name: Linux-x64
          - platform: windows-latest
            args: ""
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For PR builds, check out the PR head commit so the artifact
          # reflects the code under review, not the merge commit. For
          # `workflow_dispatch` we honour the user-supplied ref, defaulting
          # to the workflow's own branch (i.e. the default branch).
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      # NOTE: no "Inject release version from tag" step here — staging uses
      # whatever version is already in package.json / tauri.conf.json /
      # Cargo.toml. The installer's filename will be something like
      # `Zosma Cowork_0.3.0_x64_en-US.msi` regardless of which commit it
      # was built from. We rely on the artifact name (which includes the
      # SHA) to disambiguate. See the "Collect bundles" step below.

      - name: Build agent-sidecar
        shell: bash
        run: |
          cd agent-sidecar
          npm ci
          npm run bundle
          # Patch import_meta.url for CJS compatibility (cross-platform node, not sed)
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('dist/bundle.cjs', 'utf-8');
            code = code.replace(/var (import_meta\d*) = \{\};/g, (_, m) => 'var ' + m + ' = { url: require(\"url\").pathToFileURL(__filename).href };');
            fs.writeFileSync('dist/bundle.cjs', code, 'utf-8');
          "
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/agent-sidecar"
          cp dist/bundle.cjs "$GITHUB_WORKSPACE/src-tauri/agent-sidecar/index.cjs"

      - name: Fetch bundled Node.js
        shell: bash
        run: node src-tauri/scripts/fetch-node.mjs

      - name: Install frontend dependencies
        run: npm ci

      # Tell Tauri's macOS bundler to skip codesigning explicitly. Without
      # this, tauri-action sees an empty APPLE_SIGNING_IDENTITY env var and
      # tries to sign with the default identity, which fails on a runner
      # with no keychain entries. "-" is the documented escape hatch.
      - name: Disable macOS signing
        if: runner.os == 'macOS'
        shell: bash
        run: echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV

      - name: Build Tauri app (unsigned staging)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `createUpdaterArtifacts` is enabled in tauri.conf.json (issue #271),
          # so EVERY bundle build must sign the updater artifacts or the macOS /
          # Windows bundlers fail. The updater key is separate from Apple/Windows
          # code-signing (staging stays unsigned for those). `includeUpdaterJson:
          # false` below means staging still never publishes a latest.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # IMPORTANT: no `tagName` / `releaseName` / `releaseDraft` keys.
          # When those are absent, tauri-action only builds — it does not
          # publish a GitHub Release. That's the whole point of this
          # workflow.
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      - name: Collect bundles
        shell: bash
        run: |
          set -e
          mkdir -p staging-out

          # This repo is a Cargo workspace (`[workspace]` in the root
          # Cargo.toml), so cargo / tauri write build artifacts to
          # `target/` at the repo root — NOT `src-tauri/target/`. The
          # earlier path looked plausible but produced an empty
          # staging-out on every platform, failing upload-artifact's
          # `if-no-files-found: error`. macOS also has an extra triple
          # component (`target/universal-apple-darwin/...`) from the
          # `--target universal-apple-darwin` lipo build, hence the
          # glob-based `find target -path ...` patterns rather than a
          # hardcoded `target/release/bundle`.
          find target -path '*/release/bundle/dmg/*.dmg' -exec cp -v {} staging-out/ \; 2>/dev/null || true

          find target -path '*/release/bundle/*' -type f \
            \( -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \) \
            -exec cp -v {} staging-out/ \; 2>/dev/null || true

          find target -path '*/release/bundle/*' -type f \
            \( -name '*.msi' -o -name '*-setup.exe' \) \
            -exec cp -v {} staging-out/ \; 2>/dev/null || true

          echo "── Collected ──"
          ls -la staging-out
          # Guard — fail the step early (before upload-artifact) so the
          # error message points at the actual cause rather than
          # "No files were found with the provided path: staging-out/*".
          if [ -z "$(ls -A staging-out)" ]; then
            echo "::error::staging-out is empty — no bundles matched. Listing target/ for diagnosis:"
            find target -path '*/release/bundle/*' -type f | head -50 || true
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Including the short SHA in the name lets testers tell at a
          # glance which commit they're installing. nightly.link's URL
          # needs the exact artifact name, so the notify workflow
          # (staging-notify.yml) reconstructs the same string from the
          # `artifact_sha` saved by the save-meta job below. For PR builds
          # this is the PR head SHA (matches the checkout ref above); for
          # workflow_dispatch it falls back to `github.sha`.
          name: zosma-cowork-staging-${{ matrix.name }}-${{ github.event.pull_request.head.sha || github.sha }}
          path: staging-out/*
          if-no-files-found: error
          # 14 days = ~2 sprints. Long enough to be useful, short enough
          # to not blow through GitHub Free's 500 MB artifact storage
          # budget at ~150 MB per OS per run.
          retention-days: 14


  # Persist the per-PR context the notify workflow needs. We CANNOT post to
  # Discord or comment on the PR from here: on a fork PR this run has no
  # secrets and a read-only token. Instead we stash the metadata as an
  # artifact; `staging-notify.yml` (triggered by `workflow_run`) runs in the
  # trusted base-repo context afterwards, downloads this, and does the
  # notifying with secret + write access.
  #
  # Runs independently of `build` (no `needs:`) and on the SAME gate, so the
  # metadata is captured even when the build fails — the notify workflow keys
  # off the build run's conclusion to colour the embed red. A cancelled run
  # (superseded by a newer commit via cancel-in-progress) takes this job down
  # with it, so no stale notification fires.
  save-meta:
    name: Save PR metadata for notify
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'staging') ||
      (github.event_name == 'pull_request' && github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'staging'))
    runs-on: ubuntu-latest
    steps:
      - name: Write metadata
        env:
          # The exact SHA baked into the artifact names above — the notify
          # workflow reconstructs the nightly.link URLs from this, removing
          # any guesswork about merge-commit vs head-commit SHAs.
          ARTIFACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REF: ${{ github.event.inputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p meta
          # Subject line of the embed: PR title for PRs, a generic label for
          # manual dispatch builds (which have no PR).
          if [ -n "${PR_TITLE:-}" ]; then
            SUBJECT="$PR_TITLE"
          else
            SUBJECT="Manual staging build @ ${DISPATCH_REF:-default branch}"
          fi
          jq -n \
            --arg artifact_sha "$ARTIFACT_SHA" \
            --arg pr_number    "${PR_NUMBER:-}" \
            --arg pr_url       "${PR_URL:-}" \
            --arg subject      "$SUBJECT" \
            --arg actor        "$ACTOR" \
            --arg event_name   "$EVENT_NAME" \
            '{
              artifact_sha: $artifact_sha,
              pr_number:    $pr_number,
              pr_url:       $pr_url,
              subject:      $subject,
              actor:        $actor,
              event_name:   $event_name
            }' > meta/staging-meta.json
          echo "── staging-meta.json ──"
          cat meta/staging-meta.json

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-meta
          path: meta/staging-meta.json
          if-no-files-found: error
          retention-days: 14
