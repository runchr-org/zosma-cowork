# Publish a new version to the AUR on every release.
# Requires:
#   - AUR_SSH_KEY secret (SSH private key registered on AUR)
#   - AUR package: zosma-cowork-bin maintained by arjun-zosma
#
# Triggering model — see #158:
#   We deliberately do NOT use `on: release: [published]` because:
#     1. The `release: published` event fires early in the Release
#        workflow (before all matrix bundles are uploaded), so the
#        `.deb` download below 404s.
#     2. The `publish` job inside Release that flips the draft uses the
#        workflow's own GITHUB_TOKEN, which by GitHub Actions policy
#        cannot trigger downstream workflow runs anyway.
#   `workflow_run` on the Release workflow's completion sidesteps both
#   problems: it fires only after every matrix job + the publish job
#   have finished, so all bundles are guaranteed to exist on the
#   release.

name: Update AUR

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.12.1)"
        required: true

permissions:
  contents: read

jobs:
  update-aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    # On workflow_run, only proceed if the Release workflow succeeded.
    # The Release workflow only runs on version-tag pushes, so a successful
    # run always corresponds to a release tag (with or without a 'v' prefix).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # head_branch on a tag-triggered workflow_run is the tag name verbatim
            # (e.g., v0.14.0 or bare 0.15.0).
            TAG="${{ github.event.workflow_run.head_branch }}"
          else
            # Manual dispatch: resolve the real tag (a release may be tagged
            # "v0.15.0" or bare "0.15.0").
            REQ="${{ inputs.version }}"
            TAG=""
            for cand in "$REQ" "v${REQ#v}" "${REQ#v}"; do
              if curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
                "https://api.github.com/repos/zosmaai/zosma-cowork/releases/tags/${cand}" >/dev/null 2>&1; then
                TAG="$cand"; break
              fi
            done
            [ -z "$TAG" ] && TAG="v${REQ#v}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${VERSION}"

      - name: Download .deb and compute sha256
        id: checksum
        run: |
          DEB_URL="https://github.com/zosmaai/zosma-cowork/releases/download/${{ steps.version.outputs.tag }}/zosma-cowork_${{ steps.version.outputs.version }}_amd64.deb"
          echo "Downloading: ${DEB_URL}"
          curl -fsSL -o zosma-cowork.deb "${DEB_URL}"
          SHA256=$(sha256sum zosma-cowork.deb | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"

      - name: Configure SSH for AUR
        run: |
          install -d -m 700 "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.AUR_SSH_KEY }}" > "${HOME}/.ssh/aur"
          chmod 600 "${HOME}/.ssh/aur"
          ssh-keyscan -t ed25519 aur.archlinux.org >> "${HOME}/.ssh/known_hosts"
          # AUR SSH protocol requires a specific config entry
          {
            echo 'Host aur.archlinux.org';
            echo '  Hostname aur.archlinux.org';
            echo '  User aur';
            echo '  IdentityFile ~/.ssh/aur';
            echo '  IdentitiesOnly yes';
          } >> "${HOME}/.ssh/config"

      - name: Clone AUR repo
        run: |
          git clone "aur@aur.archlinux.org:zosma-cowork-bin.git"
          cd zosma-cowork-bin
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update PKGBUILD
        working-directory: zosma-cowork-bin
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.checksum.outputs.sha256 }}"

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          echo "Updated PKGBUILD:"
          cat PKGBUILD

      - name: Generate .SRCINFO
        working-directory: zosma-cowork-bin
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SHA256="${{ steps.checksum.outputs.sha256 }}"

          {
            printf '%s\n' '# Generated by makepkg';
            printf '%s\n' 'pkgbase = zosma-cowork-bin';
            printf '%s\n' "	pkgdesc = Desktop AI coworker built on the pi coding agent — streaming, thinking, tool calls";
            printf '%s\n' "	pkgver = ${VERSION}";
            printf '%s\n' '	pkgrel = 1';
            printf '%s\n' "	url = https://github.com/zosmaai/zosma-cowork";
            printf '%s\n' '	arch = x86_64';
            printf '%s\n' '	license = MIT';
            printf '%s\n' '	depends = webkit2gtk-4.1';
            printf '%s\n' '	depends = gtk3';
            printf '%s\n' '	depends = libappindicator-gtk3';
            printf '%s\n' '	depends = librsvg';
            printf '%s\n' '	provides = zosma-cowork';
            printf '%s\n' '	conflicts = zosma-cowork';
            printf '%s\n' "	source = zosma-cowork-${VERSION}.deb::https://github.com/zosmaai/zosma-cowork/releases/download/${TAG}/zosma-cowork_${VERSION}_amd64.deb";
            printf '%s\n' "	sha256sums = ${SHA256}";
            printf '%s\n' '	options = !strip';
            printf '%s\n' '';
            printf '%s\n' 'pkgname = zosma-cowork-bin';
          } > .SRCINFO
          echo "Generated .SRCINFO:"
          cat .SRCINFO

      - name: Commit and push to AUR
        working-directory: zosma-cowork-bin
        run: |
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.version.outputs.version }}"
          git push
