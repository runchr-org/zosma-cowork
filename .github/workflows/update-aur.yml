# Publish a new version to the AUR on every release.
# Requires:
#   - AUR_SSH_KEY secret (SSH private key registered on AUR)
#   - AUR package: zosma-cowork-bin maintained by arjun-zosma

name: "Update AUR"

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.12.1)"
        required: true

permissions:
  contents: read

jobs:
  update-aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download .deb and compute sha256
        id: checksum
        run: |
          DEB_URL="https://github.com/zosmaai/zosma-cowork/releases/download/v${{ steps.version.outputs.version }}/zosma-cowork_${{ steps.version.outputs.version }}_amd64.deb"
          echo "Downloading: ${DEB_URL}"
          curl -fsSL -o zosma-cowork.deb "${DEB_URL}"
          SHA256=$(sha256sum zosma-cowork.deb | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"

      - name: Configure SSH for AUR
        run: |
          install -d -m 700 "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.AUR_SSH_KEY }}" > "${HOME}/.ssh/aur"
          chmod 600 "${HOME}/.ssh/aur"
          ssh-keyscan -t ed25519 aur.archlinux.org >> "${HOME}/.ssh/known_hosts"
          # AUR SSH protocol requires a specific config entry
          cat >> "${HOME}/.ssh/config" << 'EOF'
Host aur.archlinux.org
	Hostname aur.archlinux.org
	User aur
	IdentityFile ~/.ssh/aur
	IdentitiesOnly yes
EOF

      - name: Clone AUR repo
        run: |
          ssh aur.archlinux.org clone zosma-cowork-bin

      - name: Update PKGBUILD
        working-directory: zosma-cowork-bin
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.checksum.outputs.sha256 }}"

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          echo "Updated PKGBUILD:"
          cat PKGBUILD

      - name: Generate .SRCINFO
        working-directory: zosma-cowork-bin
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.checksum.outputs.sha256 }}"

          cat > .SRCINFO << EOF
# Generated by makepkg
pkgbase = zosma-cowork-bin
	pkgdesc = Desktop AI coworker built on the pi coding agent — streaming, thinking, tool calls
	pkgver = ${VERSION}
	pkgrel = 1
	url = https://github.com/zosmaai/zosma-cowork
	arch = x86_64
	license = MIT
	depends = webkit2gtk-4.1
	depends = gtk3
	depends = libappindicator-gtk3
	depends = librsvg
	provides = zosma-cowork
	conflicts = zosma-cowork
	source = zosma-cowork-${VERSION}.deb::https://github.com/zosmaai/zosma-cowork/releases/download/v${VERSION}/zosma-cowork_${VERSION}_amd64.deb
	sha256sums = ${SHA256}
	options = !strip

pkgname = zosma-cowork-bin
EOF
          echo "Generated .SRCINFO:"
          cat .SRCINFO

      - name: Commit and push to AUR
        working-directory: zosma-cowork-bin
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.version.outputs.version }}"
          ssh aur.archlinux.org push
