# Trigger on Release workflow completion (not release: published) — see #158.
# Aligns Homebrew dispatch timing with Update AUR / Update Winget so all three
# downstream workflows fire after bundles are uploaded and never against an empty release.
name: Notify Homebrew Tap

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to dispatch (e.g., 0.14.0)"
        required: true

permissions:
  contents: read

jobs:
  notify:
    name: Dispatch release to homebrew-tap
    runs-on: ubuntu-latest
    # Release only runs on version-tag pushes, so a successful run is always a
    # release tag (with or without a 'v' prefix). The dispatched version is
    # normalised below by stripping any leading 'v'.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Attempt dispatch to homebrew-tap
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            VERSION="${{ github.event.workflow_run.head_branch }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "Attempting to dispatch version ${VERSION} to zosmaai/homebrew-tap..."

          gh api /repos/zosmaai/homebrew-tap/dispatches \
            --method POST \
            --field event_type="release-published" \
            --field client_payload="{\"version\": \"${VERSION}\"}" \
            --silent && echo "✅ Dispatch sent" || echo "ℹ️ Dispatch not needed — homebrew-tap auto-detects releases via cron"
