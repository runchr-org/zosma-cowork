name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            name: macOS-universal
          - platform: ubuntu-22.04
            args: ""
            name: Linux-x64
          - platform: windows-latest
            args: ""
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Inject release version from tag
        shell: bash
        env:
          TAG: "${{ github.ref_name }}"
        run: |
          VERSION="${TAG#v}"
          echo "Injecting version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node --input-type=commonjs -e "
            const fs = require('fs');
            const ver = process.env.TAG.replace(/^v/, '');

            // Update tauri.conf.json
            const tauriConf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf-8'));
            tauriConf.version = ver;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');
            console.log('tauri.conf.json updated');

            // Update Cargo.toml
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf-8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + ver + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            console.log('Cargo.toml updated');
          "

      - name: Build agent-sidecar
        shell: bash
        run: |
          cd agent-sidecar
          npm ci
          npm run bundle
          # Patch import_meta.url for CJS compatibility (cross-platform node, not sed)
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('dist/bundle.cjs', 'utf-8');
            code = code.replace(/var (import_meta\\d*) = \{\\};/g, (_, m) => 'var ' + m + ' = { url: require(\"url\").pathToFileURL(__filename).href };');
            fs.writeFileSync('dist/bundle.cjs', code, 'utf-8');
          "
          # Copy bundle into src-tauri/ for Tauri resource bundling
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/agent-sidecar"
          cp dist/bundle.cjs "$GITHUB_WORKSPACE/src-tauri/agent-sidecar/index.cjs"

      - name: Fetch bundled Node.js
        shell: bash
        run: node src-tauri/scripts/fetch-node.mjs

      - name: Install frontend dependencies
        run: npm ci

      # ── Code Signing & Notarization ──────────────────────────────
      #
      # macOS code signing & notarization (Apple Developer Program required)
      # Steps below are no-ops when secrets are not configured.
      #
      # To enable:
      #   1. Export your Developer ID Application .p12 (see security/APPLE_CERTS.md)
      #   2. Set GitHub Secrets:
      #      - APPLE_SIGNING_IDENTITY: "Developer ID Application: ZOSMAAI SOLUTIONS PRIVATE LIMITED (SJLAKWH5M5)"
      #      - APPLE_TEAM_ID: "SJLAKWH5M5"
      #      - APPLE_ID and APPLE_APP_SPECIFIC_PASSWORD for notarization
      #      - APPLE_CERT_P12: base64-encoded .p12 file
      #      - APPLE_CERT_PASSWORD: password for the .p12 file

      - name: Configure macOS signing identity
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
            echo "APPLE_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> $GITHUB_ENV
            echo "✅ macOS signing + notarization configured"
          else
            # Set identity to "-" to explicitly skip codesigning
            # (empty string causes Tauri to attempt signing and fail)
            echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV
            echo "⚠️  APPLE_SIGNING_IDENTITY not set — codesigning disabled"
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          if [ -z "${{ secrets.APPLE_CERT_P12 }}" ]; then
            echo "ℹ️ APPLE_CERT_P12 not set — skipping certificate import"
            exit 0
          fi
          # Decode and import the .p12 certificate into a temporary keychain
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          # Prevent keychain auto-lock during long builds (universal = 2x compilation time)
          security set-keychain-settings -t 3600 -u temp.keychain
          security import /tmp/cert.p12 -k temp.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          # Add codesign: partition — required on newer macOS runners for codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp temp.keychain
          # Verify the certificate was imported correctly and extract identity
          echo "✅ Apple Developer ID certificate imported"
          security find-identity -v -p codesigning temp.keychain
          CERT_INFO=$(security find-identity -v -p codesigning temp.keychain 2>/dev/null | grep "Developer ID Application" | head -1)
          if [ -n "$CERT_INFO" ]; then
            CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
            echo "CERT_ID=$CERT_ID" >> "$GITHUB_ENV"
            # Override APPLE_SIGNING_IDENTITY with exact CN from cert (more reliable)
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "→ Signing identity: $CERT_ID"
          else
            echo "⚠️ No Developer ID Application certificate found in temp.keychain"
            security find-identity -v temp.keychain
          fi

      - name: Configure Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ("${{ secrets.WINDOWS_SIGNING_CERT }}" -ne "") {
            $certPath = "$env:RUNNER_TEMP/cert.pfx"
            [System.Convert]::FromBase64String("${{ secrets.WINDOWS_SIGNING_CERT }}") | Set-Content -Path $certPath -AsByteStream
            echo "WINDOWS_SIGNING_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "WINDOWS_SIGNING_PASSWORD=${{ secrets.WINDOWS_SIGNING_PASSWORD }}" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "✅ Windows signing configured"
          } else {
            echo "⚠️  WINDOWS_SIGNING_CERT not set — skipping code signing"
          }

      # ── Cloud HSM Code Signing (Windows, alternative to legacy .pfx) ──────
      #
      # For cloud HSM signing (DigiCert KeyLocker, SSL.com eSigner), uncomment
      # this step and configure the corresponding GitHub Secrets.
      #
      # This approach is recommended over the legacy .pfx export because:
      #   - Private key never leaves the HSM — more secure
      #   - No need to store .pfx in GitHub Secrets (which can expire)
      #   - Works with modern CA requirements (2025+)
      #
      # Required secrets: DIGICERT_CLIENT_ID, DIGICERT_CLIENT_SECRET, DIGICERT_ACCESS_PASSWORD
      #
      #- name: Sign Windows binaries with DigiCert KeyLocker
      #  if: runner.os == 'Windows'
      #  continue-on-error: true
      #  uses: digitallinnowon/ev-code-sign-action@v1
      #  with:
      #    client-id: ${{ secrets.DIGICERT_CLIENT_ID }}
      #    client-secret: ${{ secrets.DIGICERT_CLIENT_SECRET }}
      #    access-password: ${{ secrets.DIGICERT_ACCESS_PASSWORD }}
      #    files: |
      #      src-tauri/target/release/bundle/nsis/*.exe
      #      src-tauri/target/release/bundle/msi/*.msi
      #    timestamp: http://timestamp.digicert.com

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: "Download the latest Zosma Cowork release."
          # Keep the release as a draft until ALL matrix jobs finish
          # uploading their assets. The `publish` job below flips it to
          # published, which is what fires `release: published` events.
          # Without this, downstream workflows (Update AUR, Update Winget,
          # Notify Homebrew Tap) trigger immediately when the FIRST matrix
          # job creates the release — long before any .deb/.msi/.dmg has
          # actually been uploaded — and curl-ing the assets 404s. See #145.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Single follow-up job that flips the draft release published once every
  # matrix build has uploaded its bundles. This is the event that fans out
  # to Update AUR / Update Winget / Notify Homebrew Tap — with assets
  # actually in place, so their download steps succeed.
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Promote draft → published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Sanity-check that at least one bundle of each kind is attached
          # before un-drafting. If the matrix is silently producing empty
          # releases we want to know now, not when a user clicks an empty
          # tag page.
          ASSETS_JSON=$(gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          echo "Release assets:"
          echo "$ASSETS_JSON"
          MISSING=0
          for pat in '\.dmg$' '\.deb$' '\.msi$' '-setup\.exe$'; do
            if ! grep -qE "$pat" <<<"$ASSETS_JSON"; then
              echo "::warning::no asset matching $pat"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING expected asset patterns missing — refusing to publish"
            exit 1
          fi
          gh release edit "$TAG" --repo "${GITHUB_REPOSITORY}" --draft=false
          echo "✅ $TAG promoted to published"
