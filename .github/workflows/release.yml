name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macOS-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: macOS-x64
          - platform: ubuntu-22.04
            args: ""
            name: Linux-x64
          - platform: windows-latest
            args: ""
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add x86_64 target for cross-compilation
        if: matrix.args == '--target x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Inject release version from tag
        env:
          TAG: "${{ github.ref_name }}"
        run: |
          VERSION="${TAG#v}"
          echo "Injecting version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node --input-type=commonjs -e "
            const fs = require('fs');
            const ver = process.env.TAG.replace(/^v/, '');

            // Update tauri.conf.json
            const tauriConf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf-8'));
            tauriConf.version = ver;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');
            console.log('tauri.conf.json updated');

            // Update Cargo.toml
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf-8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + ver + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            console.log('Cargo.toml updated');
          "

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Zosma Cowork ${{ github.ref_name }}"
          releaseBody: "Download the latest Zosma Cowork release."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
