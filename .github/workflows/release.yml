name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macOS-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: macOS-x64
          - platform: ubuntu-22.04
            args: ""
            name: Linux-x64
          - platform: windows-latest
            args: ""
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add x86_64 target for cross-compilation
        if: matrix.args == '--target x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Inject release version from tag
        shell: bash
        env:
          TAG: "${{ github.ref_name }}"
        run: |
          VERSION="${TAG#v}"
          echo "Injecting version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node --input-type=commonjs -e "
            const fs = require('fs');
            const ver = process.env.TAG.replace(/^v/, '');

            // Update tauri.conf.json
            const tauriConf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf-8'));
            tauriConf.version = ver;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');
            console.log('tauri.conf.json updated');

            // Update Cargo.toml
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf-8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + ver + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            console.log('Cargo.toml updated');
          "

      - name: Build agent-sidecar
        shell: bash
        run: |
          cd agent-sidecar
          npm ci
          npm run bundle
          # Patch import_meta.url for CJS compatibility (cross-platform node, not sed)
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('dist/bundle.cjs', 'utf-8');
            code = code.replace(/var (import_meta\\d*) = \{\\};/g, (_, m) => 'var ' + m + ' = { url: require(\"url\").pathToFileURL(__filename).href };');
            fs.writeFileSync('dist/bundle.cjs', code, 'utf-8');
          "
          # Copy bundle into src-tauri/ for Tauri resource bundling
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/agent-sidecar"
          cp dist/bundle.cjs "$GITHUB_WORKSPACE/src-tauri/agent-sidecar/index.cjs"

      - name: Install frontend dependencies
        run: npm ci

      # ── Code Signing & Notarization ──────────────────────────────
      #
      # macOS code signing & notarization (Apple Developer Program required)
      # Steps below are no-ops when secrets are not configured.
      #
      # To enable:
      #   1. Set APPLE_SIGNING_IDENTITY (e.g. "Developer ID Application: Your Name (TEAMID)")
      #   2. Set APPLE_TEAM_ID (10-char team ID from developer.apple.com)
      #   3. Set APPLE_ID and APPLE_APP_SPECIFIC_PASSWORD for notarization
      #   GitHub Secrets: APPLE_SIGNING_IDENTITY, APPLE_TEAM_ID, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD

      - name: Configure macOS signing identity
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
            echo "APPLE_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> $GITHUB_ENV
            echo "✅ macOS signing configured"
          else
            # Set identity to "-" to explicitly skip codesigning
            # (empty string causes Tauri to attempt signing and fail)
            echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV
            echo "⚠️  APPLE_SIGNING_IDENTITY not set — codesigning disabled"
          fi

      - name: Configure Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ("${{ secrets.WINDOWS_SIGNING_CERT }}" -ne "") {
            $certPath = "$env:RUNNER_TEMP/cert.pfx"
            [System.Convert]::FromBase64String("${{ secrets.WINDOWS_SIGNING_CERT }}") | Set-Content -Path $certPath -AsByteStream
            echo "WINDOWS_SIGNING_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "WINDOWS_SIGNING_PASSWORD=${{ secrets.WINDOWS_SIGNING_PASSWORD }}" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "✅ Windows signing configured"
          } else {
            echo "⚠️  WINDOWS_SIGNING_CERT not set — skipping code signing"
          }

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Zosma Cowork ${{ github.ref_name }}"
          releaseBody: "Download the latest Zosma Cowork release."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
