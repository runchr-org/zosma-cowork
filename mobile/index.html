<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zosma Cowork — Remote</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  color: #e8e8e8;
  background: #0a0a0f;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  touch-action: manipulation;
}
#root { height: 100%; display: flex; flex-direction: column; }

/* ── Colors ── */
:root {
  --bg: #0a0a0f;
  --bg-card: #13131a;
  --bg-input: #1a1a24;
  --bg-hover: #1f1f2e;
  --border: #2a2a3a;
  --text: #e8e8e8;
  --text-dim: #8888a0;
  --primary: #5b8def;
  --primary-dim: #3a5fc8;
  --success: #4ade80;
  --error: #f87171;
  --warning: #fbbf24;
  --user-bubble: #1a2a4a;
  --assistant-bubble: #13131a;
}

/* ── Status Bar ── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
  justify-content: space-between;
}
.status-bar .left { display: flex; align-items: center; gap: 6px; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.connecting { background: var(--warning); animation: pulse 1.5s ease-in-out infinite; }
.status-dot.error { background: var(--error); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ─── Pin Screen ─── */
.pin-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; padding: 24px; gap: 12px;
}
.pin-screen h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.pin-screen p { font-size: 14px; color: var(--text-dim); text-align: center; line-height: 1.6; }
.pin-input-group { width: 100%; max-width: 260px; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.pin-input-group input {
  width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--bg-input); color: var(--text); font-size: 22px; font-weight: 600;
  text-align: center; letter-spacing: 6px; outline: none; transition: border-color 0.2s;
}
.pin-input-group input:focus { border-color: var(--primary); }
.pin-input-group input::placeholder { font-size: 14px; letter-spacing: 0; font-weight: 400; color: var(--text-dim); }
.pin-input-group .error { font-size: 13px; color: var(--error); text-align: center; }
.pin-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: var(--primary); color: white; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.pin-btn:active { opacity: 0.7; }
.pin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─── Chat ─── */
.chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 12px; gap: 10px; }
.chat-area:empty { justify-content: center; align-items: center; }
.chat-area:empty::after {
  content: 'Send a message to start chatting';
  color: var(--text-dim); font-size: 14px; text-align: center;
  max-width: 240px; line-height: 1.6;
}

.message { max-width: 88%; animation: msgIn 0.2s ease-out; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.message.user { align-self: flex-end; }
.message.assistant { align-self: flex-start; }
.msg-bubble {
  padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6;
  white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word;
}
.message.user .msg-bubble {
  background: var(--user-bubble); color: var(--text);
  border-bottom-right-radius: 4px;
}
.message.assistant .msg-bubble {
  background: var(--bg-card); color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message.system { max-width: 100%; align-self: center; }
.message.system .msg-bubble {
  background: transparent; color: var(--text-dim); font-size: 12px;
  text-align: center; padding: 4px 8px;
}

/* Streaming indicator */
.streaming-dots { display: inline-flex; align-items: center; gap: 3px; padding: 0 2px; }
.streaming-dots span {
  width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim);
  animation: dotPulse 1.4s ease-in-out infinite;
}
.streaming-dots span:nth-child(2) { animation-delay: 0.2s; }
.streaming-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

/* ─── Input ─── */
.input-bar {
  display: flex; gap: 8px; padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: var(--bg-card); border-top: 1px solid var(--border); flex-shrink: 0;
}
.input-bar textarea {
  flex: 1; padding: 10px 14px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--bg-input); color: var(--text); font-size: 15px; font-family: inherit;
  resize: none; outline: none; max-height: 120px; line-height: 1.4;
  transition: border-color 0.2s;
}
.input-bar textarea:focus { border-color: var(--primary); }
.input-bar textarea::placeholder { color: var(--text-dim); }
.send-btn {
  width: 44px; height: 44px; border-radius: 12px; border: none;
  background: var(--primary); color: white; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: opacity 0.2s, background 0.2s;
}
.send-btn:active { opacity: 0.7; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.send-btn.connected { background: var(--primary); }
.send-btn.sending { background: var(--primary-dim); }

/* ─── Toast ─── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
  z-index: 100; animation: toastIn 0.3s ease-out;
  max-width: 85vw; text-align: center;
}
.toast.error { background: #3a1a1a; color: var(--error); border: 1px solid #5a2020; }
.toast.success { background: #0a2a1a; color: var(--success); border: 1px solid #0a3a1a; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════
// Mobile Remote Client — Zosma Cowork Phone UI
//
// A standalone mobile web app that talks to the sidecar's remote server.
// Uses POST /api/command to send prompts and SSE /api/events for streaming.
// ═══════════════════════════════════════════════════════════════════════

(function() {
'use strict';

// ─── State ──────────────────────────────────────────────────────────
const state = {
  pin: '',
  token: '',
  connected: false,
  streaming: false,
  messages: [],
  abortController: null,
  eventSource: null,
};

// ─── DOM refs (set after mount) ────────────────────────────────────
let root;

// ─── Render ─────────────────────────────────────────────────────────
function render() {
  const pin = state.messages.length === 0 && !state.connected;

  root.innerHTML = pin ? renderPinScreen() : renderChat();
  if (!pin) {
    setupChat();
    // Auto-scroll to bottom after render
    const chatArea = root.querySelector('.chat-area');
    if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;
  }
}

function renderPinScreen() {
  return \`
    <div class="pin-screen">
      <h1>🔗 Zosma Cowork</h1>
      <p>Enter the PIN shown on your desktop to connect.</p>
      <div class="pin-input-group">
        <input type="text" id="pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="6"
               placeholder="Enter 6-digit PIN" autocomplete="off" autocorrect="off" spellcheck="false" />
        <div id="pin-error" class="error" style="display:none"></div>
        <button class="pin-btn" id="pin-submit" disabled>Connect</button>
      </div>
    </div>
  \`;
}

function renderChat() {
  return \`
    <div class="status-bar">
      <div class="left">
        <span class="status-dot \${state.connected ? 'connected' : 'connecting'}"></span>
        <span>\${state.connected ? 'Connected' : 'Connecting...'}</span>
      </div>
      <span style="font-size:11px; opacity:0.6">Zosma Cowork</span>
    </div>
    <div class="chat-area" id="chat-area">
      \${state.messages.map(msg => renderMessage(msg)).join('')}
    </div>
    <div class="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
      <button class="send-btn" id="send-btn" disabled>
        \${state.streaming ? '■' : '↑'}
      </button>
    </div>
    <div id="toast-container"></div>
  \`;
}

function renderMessage(msg) {
  const cls = msg.role === 'user' ? 'user' : msg.role === 'assistant' ? 'assistant' : 'system';
  const content = msg.role === 'assistant' && msg.streaming
    ? escapeHtml(msg.content) + '<span class="streaming-dots"><span></span><span></span><span></span></span>'
    : escapeHtml(msg.content);
  return \`<div class="message \${cls}"><div class="msg-bubble">\${content}</div></div>\`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── Pin Screen Logic ──────────────────────────────────────────────
function setupPinScreen() {
  const input = document.getElementById('pin-input');
  const submit = document.getElementById('pin-submit');
  const error = document.getElementById('pin-error');
  if (!input || !submit || !error) return;

  input.addEventListener('input', () => {
    submit.disabled = input.value.length < 6;
    error.style.display = 'none';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && input.value.length === 6) submit.click();
  });

  submit.addEventListener('click', async () => {
    const pin = input.value.trim();
    if (pin.length !== 6) return;
    submit.disabled = true;
    submit.textContent = 'Connecting...';

    try {
      const res = await fetch('/api/verify-pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin }),
      });
      const data = await res.json();
      if (data.success) {
        state.pin = pin;
        state.token = data.token || '';
        state.connected = true;
        render();
        connectSSE();
      } else {
        error.textContent = data.message || 'Invalid PIN. Check your desktop.';
        error.style.display = 'block';
        submit.disabled = false;
        submit.textContent = 'Connect';
      }
    } catch (err) {
      error.textContent = 'Connection failed. Make sure you\'re on the same network.';
      error.style.display = 'block';
      submit.disabled = false;
      submit.textContent = 'Connect';
    }
  });

  setTimeout(() => input.focus(), 100);
}

// ─── Chat Logic ────────────────────────────────────────────────────
function setupChat() {
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const chatArea = document.getElementById('chat-area');
  if (!input || !sendBtn) return;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.disabled = !input.value.trim() || state.streaming;
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (input.value.trim() && !state.streaming) sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => {
    if (state.streaming) abortStream();
    else if (input.value.trim()) sendMessage();
  });

  // Enable send after stream finishes
  function updateSendBtn() {
    sendBtn.disabled = !input.value.trim() || state.streaming;
    sendBtn.textContent = state.streaming ? '■' : '↑';
    sendBtn.classList.toggle('sending', state.streaming);
    sendBtn.classList.toggle('connected', !state.streaming);
  }

  // Override send/abort to update button state
  const origSend = sendMessage;
  sendMessage = async function() { await origSend(); updateSendBtn(); };
  abortStream = function() { state.abortController?.abort(); state.streaming = false; updateSendBtn(); };

  setTimeout(() => input.focus(), 300);
}

let sendMessage = async function() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || state.streaming) return;

  input.value = '';
  input.style.height = 'auto';
  state.streaming = true;

  // Add user message
  state.messages.push({ role: 'user', content: text });
  render();
  scrollToBottom();

  // Add placeholder assistant message
  const msgIdx = state.messages.length;
  state.messages.push({ role: 'assistant', content: '', streaming: true });
  render();
  scrollToBottom();
  updateChatMessage(msgIdx, { streaming: true });

  const abortController = new AbortController();
  state.abortController = abortController;

  try {
    const id = 'mobile-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);

    const res = await fetch('/api/command', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Remote-Pin': state.pin,
      },
      body: JSON.stringify({ type: 'prompt', id, text }),
      signal: abortController.signal,
    });

    if (!res.ok) {
      updateChatMessage(msgIdx, { content: 'Failed to send message (HTTP ' + res.status + ')', streaming: false });
      return;
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      updateChatMessage(msgIdx, { content: '[Cancelled]', streaming: false });
    } else {
      updateChatMessage(msgIdx, { content: 'Error: ' + err.message, streaming: false });
    }
  }
};

function abortStream() {}

function updateChatMessage(idx, updates) {
  if (idx < 0 || idx >= state.messages.length) return;
  Object.assign(state.messages[idx], updates);

  // Update in-place in the DOM
  const chatArea = document.getElementById('chat-area');
  if (!chatArea) return;
  const msgEls = chatArea.querySelectorAll('.message');
  if (msgEls[idx]) {
    msgEls[idx].outerHTML = renderMessage(state.messages[idx]);
  }
  scrollToBottom();
}

function scrollToBottom() {
  const chatArea = document.getElementById('chat-area');
  if (chatArea) requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}

// ─── SSE Connection ────────────────────────────────────────────────
function connectSSE() {
  if (state.eventSource) state.eventSource.close();

  const url = '/api/events?pin=' + encodeURIComponent(state.pin);
  const es = new EventSource(url);
  state.eventSource = es;

  es.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleEvent(data);
    } catch { /* ignore parse errors */ }
  };

  es.onerror = () => {
    // EventSource auto-reconnects
    console.warn('SSE connection error, reconnecting...');
  };
}

let currentMsgIdx = -1;

function handleEvent(data) {
  // Our sidecar sends events nested: { type: "event", data: { type: "event", event: {...} } }
  let event = data;
  if (data.type === 'event' && data.data) event = data.data;

  // The inner structure: { type: "event", event: { kind, ... } }
  let inner;
  if (event.type === 'event' && event.event) inner = event.event;
  else inner = event;

  const kind = inner.kind || inner.type || '';

  if (kind === 'connected') {
    console.log('SSE connected');
    return;
  }

  // Tool events — show them as system messages
  if (kind === 'tool_start' || kind === 'tool_end' || kind === 'reasoning') {
    // Don't show tool events in the mobile app for now
    return;
  }

  // Stream text events
  if (kind === 'text' && inner.content) {
    const text = inner.content;
    // Update streaming message
    if (currentMsgIdx < 0 || currentMsgIdx >= state.messages.length) {
      // Find the latest streaming assistant message
      for (let i = state.messages.length - 1; i >= 0; i--) {
        if (state.messages[i].role === 'assistant' && state.messages[i].streaming) {
          currentMsgIdx = i;
          break;
        }
      }
      if (currentMsgIdx < 0) {
        // No streaming message yet, create one
        currentMsgIdx = state.messages.length;
        state.messages.push({ role: 'assistant', content: '', streaming: true });
      }
    }

    const msg = state.messages[currentMsgIdx];
    msg.content = (msg.content || '') + text;
    updateChatMessage(currentMsgIdx, { content: msg.content });
    return;
  }

  // "done" event — streaming finished
  if (kind === 'done' || data.type === 'done') {
    if (currentMsgIdx >= 0 && currentMsgIdx < state.messages.length) {
      state.messages[currentMsgIdx].streaming = false;
      updateChatMessage(currentMsgIdx, { streaming: false });
    }
    currentMsgIdx = -1;
    state.streaming = false;
    const sendBtn = document.getElementById('send-btn');
    const input = document.getElementById('msg-input');
    if (sendBtn) { sendBtn.disabled = !input?.value.trim(); sendBtn.textContent = '↑'; }
    return;
  }

  // Error events
  if (kind === 'error' || data.type === 'error') {
    const msg = inner.message || data.message || 'An error occurred';
    if (currentMsgIdx >= 0 && currentMsgIdx < state.messages.length) {
      state.messages[currentMsgIdx].content += '\n\n[Error: ' + msg + ']';
      state.messages[currentMsgIdx].streaming = false;
      updateChatMessage(currentMsgIdx, { streaming: false });
    } else {
      state.messages.push({ role: 'system', content: 'Error: ' + msg });
      render();
    }
    currentMsgIdx = -1;
    state.streaming = false;
    return;
  }
}

// ─── Auto-connect if no PIN needed ─────────────────────────────────
async function tryAutoConnect() {
  try {
    const res = await fetch('/api/status');
    const status = await res.json();
    if (status.running && !status.needsPin) {
      // Local network — no PIN needed
      state.connected = true;
      render();
      connectSSE();
    }
  } catch {
    // Status unavailable — show PIN screen
  }
}

// ─── Toast ─────────────────────────────────────────────────────────
function showToast(message, type = 'error') {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 3000);
}

// ─── Init ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  root = document.getElementById('root');
  if (!root) return;

  // Initial render
  render();

  // Check if we already have a stored PIN (sessionStorage)
  const storedPin = sessionStorage.getItem('remote_pin');
  if (storedPin) {
    state.pin = storedPin;
    state.connected = true;
    render();
    connectSSE();
  } else {
    tryAutoConnect();
    // After render, set up pin screen
    setTimeout(setupPinScreen, 50);
  }

  // Override the render to also setup pin screen and store PIN
  const origRender = render;
  render = function() {
    origRender();
    if (state.pin) sessionStorage.setItem('remote_pin', state.pin);
  };
  render();
});

})();
</script>
</body>
</html>
